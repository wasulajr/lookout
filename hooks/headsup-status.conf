# iTerm2 status hook configuration (global).
# Sourced by ~/.claude/hooks/headsup-status.sh. Edit colors via the
# /headsup-colors skill, or by hand. Per-session label overrides (title
# + badge) live in ~/.claude/hooks/headsup-status.d/<session-key>.conf and
# are managed by the /headsup-label skill.
#
# Hex colors are 6 chars, no leading #.

IDLE_COLOR="ffffff"     # white  — fresh session / idle
PROCESS_COLOR="3a82f5"  # blue   — Claude is processing your prompt
WAIT_COLOR="e67e22"     # orange — Claude is waiting on you

# Default badge text: the watermark in the top-right of the iTerm2 pane.
# Receives no args; echoes the badge string.
# Override per-session via /headsup-label.
#
# Special case: when basename($PWD) is literally "Claude" (the "session
# container" pattern — e.g. .../Digadop - AI Agents/Claude/), every project
# would otherwise share the same badge. If that folder is a node project,
# prefer its package.json `name`. Falls back to basename otherwise.
headsup_badge_text() {
    local b
    b=$(basename "$PWD")
    if [ "$b" = "Claude" ] && [ -f "$PWD/package.json" ]; then
        local name
        name=$(node -p "require('./package.json').name" 2>/dev/null)
        if [ -n "$name" ] && [ "$name" != "undefined" ]; then
            echo "$name"
            return
        fi
    fi
    echo "$b"
}

# Default window/tab title format.
# Receives the badge text as $1; echoes the title string.
# Override per-session via /headsup-label.
headsup_title_text() {
    printf 'Claude · %s' "$1"
}

# Optional per-project color overrides.
